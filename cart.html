<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart - special product</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="page-header">
    <div class="header-brand">
      <a href="index.html" class="logo">
        <img src="logo.png" alt="Innovation" class="logo-img" width="160" height="40" />
      </a>
      <span class="header-tagline">Products</span>
    </div>
    <nav class="header-nav">
      <a href="cart.html" class="nav-link nav-cart active">Cart <span id="cart-count" class="cart-badge hidden">0</span></a>
      <a href="dashboard.html" class="nav-link">Dashboard</a>
    </nav>
  </header>

  <main>
    <h1>Your cart</h1>
    <p class="subtitle">Review items before checkout - quantities update instantly.</p>

    <div class="layout-two-col">
      <div class="card">
        <div id="cart-empty" class="cart-empty hidden">
          <p>Your cart is empty.</p>
          <a href="index.html" class="btn btn-primary btn-sm">Browse products</a>
        </div>
        <div id="cart-list" class="cart-list"></div>
      </div>

      <aside id="cart-summary" class="card checkout-summary hidden">
        <h2>Order summary</h2>
        <div class="order-summary-item">
          <span>Subtotal</span>
          <span id="cart-subtotal">$0</span>
        </div>
        <div class="order-summary-item">
          <span>Shipping</span>
          <span>Free</span>
        </div>
        <div class="order-summary-total">
          <span>Total</span>
          <span id="cart-total">$0</span>
        </div>
        <a href="checkout.html" id="checkout-btn" class="btn btn-primary">Proceed to checkout</a>
        <p style="margin-top: 1rem; font-size: 0.875rem;">
          <a href="index.html">← Continue shopping</a>
        </p>
      </aside>
    </div>
  </main>

  <script type="module" src="js/nav.js"></script>
  <script type="module" src="js/cart-page.js"></script>
</body>
</html>
