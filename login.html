<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in - special product</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="page-header">
    <div class="header-brand">
      <a href="login.html" class="logo">
        <img src="logo.png" alt="Innovation" class="logo-img" width="160" height="40" />
      </a>
      <span class="header-tagline">Products</span>
    </div>
    <nav class="header-nav"></nav>
  </header>

  <main class="main--auth">
    <div class="card auth-card">
      <h1>Sign in</h1>
      <p class="subtitle">Use your account to access the dashboard and checkout faster.</p>

      <div id="auth-alert" class="auth-alert hidden" role="alert"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" minlength="8" />
        </div>
        <button type="submit" class="btn btn-primary" id="login-submit">Sign in</button>
      </form>

      <p class="auth-links">
        <a href="reset-password.html">Forgot password?</a>
        <span aria-hidden="true">·</span>
        <a href="register.html">Create account</a>
      </p>
    </div>
  </main>

  <script type="module" src="js/login.js"></script>
</body>
</html>
