<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create account - special product</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="page-header">
    <div class="header-brand">
      <a href="login.html" class="logo">
        <img src="logo.png" alt="Innovation" class="logo-img" width="160" height="40" />
      </a>
      <span class="header-tagline">Products</span>
    </div>
    <nav class="header-nav"></nav>
  </header>

  <main class="main--auth">
    <div class="card auth-card">
      <h1>Create account</h1>
      <p class="subtitle">Register to save your details and track orders.</p>

      <div id="auth-alert" class="auth-alert hidden" role="alert"></div>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label for="name">Full name</label>
          <input type="text" id="name" name="name" required autocomplete="name" placeholder="Yael Cohen" />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="new-password" minlength="8" />
        </div>
        <div class="form-group">
          <label for="confirm">Confirm password</label>
          <input type="password" id="confirm" name="confirm" required autocomplete="new-password" minlength="8" />
        </div>
        <button type="submit" class="btn btn-primary" id="register-submit">Create account</button>
      </form>

      <p class="auth-links">
        Already have an account? <a href="login.html">Sign in</a>
      </p>
    </div>
  </main>

  <script type="module" src="js/register.js"></script>
</body>
</html>
