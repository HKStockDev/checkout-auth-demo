<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password - special product</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="page-header">
    <div class="header-brand">
      <a href="login.html" class="logo">
        <img src="logo.png" alt="Innovation" class="logo-img" width="160" height="40" />
      </a>
      <span class="header-tagline">Products</span>
    </div>
    <nav class="header-nav"></nav>
  </header>

  <main class="main--auth">
    <div class="card auth-card">
      <h1>Reset password</h1>

      <div id="auth-alert" class="auth-alert hidden" role="alert"></div>

      <div id="reset-request-panel">
        <p class="subtitle">Enter your email and we will send a reset link.</p>
        <form id="reset-request-form" novalidate>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com" />
          </div>
          <button type="submit" class="btn btn-primary" id="reset-request-submit">Send reset link</button>
        </form>
        <p class="auth-links">
          Have a token?
          <button type="button" class="btn-link" id="switch-to-confirm">Enter reset token</button>
        </p>
      </div>

      <div id="reset-confirm-panel" class="hidden">
        <p class="subtitle">Set a new password using your reset token.</p>
        <form id="reset-confirm-form" novalidate>
          <div class="form-group">
            <label for="token">Reset token</label>
            <input type="text" id="token" name="token" required autocomplete="off" />
          </div>
          <div class="form-group">
            <label for="password">New password</label>
            <input type="password" id="password" name="password" required autocomplete="new-password" minlength="8" />
          </div>
          <div class="form-group">
            <label for="confirm">Confirm password</label>
            <input type="password" id="confirm" name="confirm" required autocomplete="new-password" minlength="8" />
          </div>
          <button type="submit" class="btn btn-primary" id="reset-confirm-submit">Update password</button>
        </form>
        <p class="auth-links">
          <button type="button" class="btn-link" id="switch-to-request">Request a new link</button>
        </p>
      </div>

      <p class="auth-links">
        <a href="login.html">Back to sign in</a>
      </p>
    </div>
  </main>

  <script type="module" src="js/reset-password.js"></script>
</body>
</html>
